# ✅ Minimal `Dockerfile` (required to run)

```dockerfile
FROM python:3.11-slim

WORKDIR /app

COPY pyproject.toml .
RUN pip install --no-cache-dir --upgrade pip && pip install .

COPY ./src ./src

ENV PYTHONPATH=/app/src

CMD ["uvicorn", "age.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
```

