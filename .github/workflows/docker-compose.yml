# ✅ `docker-compose.yml` (drop into root of repo)

```yaml
version: "3.9"

services:

  api:
    build: .
    container_name: age-api
    command: uvicorn age.api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - ./src:/app/src

  postgres:
    image: postgres:15
    container_name: age-postgres
    restart: always
    environment:
      POSTGRES_USER: age
      POSTGRES_PASSWORD: agepass
      POSTGRES_DB: age_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: age-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: age-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: age-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  worker:
    build: .
    container_name: age-worker
    command: python -m age.training.train
    depends_on:
      - kafka
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - ./src:/app/src

volumes:
  pgdata:
```

